<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:;">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion Espace Client — Purity Agency</title>
<meta name="description" content="Connectez-vous à votre espace client Purity Agency.">
<meta property="og:image" content="https://purity-agency.be/assets/logo.png">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="css/site.css">
<link rel="stylesheet" href="css/site-extra.css">
<link rel="stylesheet" href="css/dashboard.css">
<style>
  .login-container {
    max-width: 440px;
    margin: 8rem auto 4rem;
    padding: 2.5rem;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 20px;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    text-align: center;
  }
  .login-container h1 {
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
    font-family: var(--font-head);
  }
  .login-container p {
    font-size: 0.85rem;
    color: var(--c-fg-muted);
    margin-bottom: 2rem;
    line-height: 1.5;
  }
  .login-form .field {
    text-align: left;
    margin-bottom: 1.5rem;
  }
  .login-form .btn {
    width: 100%;
    padding: 1rem;
    border-radius: 99px;
  }
  .login-success {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }
  .login-success svg {
    width: 48px;
    height: 48px;
    color: #34D399;
  }
  #login-error {
    color: #ef4444;
    font-size: 0.85rem;
    margin-bottom: 1rem;
    display: none;
  }
</style>
</head>
<body class="page-dashboard">
<header class="dash-header">
  <a href="/" class="dash-logo">PURITY<span class="dash-logo-dot">.</span></a>
  <span class="dash-header-label">Espace client</span>
</header>
<main class="dash-main" style="padding: 1rem;">
  <div class="login-container">
    
    <div id="login-form-view">
      <h1>Accès Client</h1>
      <p>Entrez l'adresse e-mail associée à votre projet. Nous vous enverrons un lien d'accès magique instantanément.</p>
      
      <form id="login-form" class="login-form">
        <div id="login-error"></div>
        <div class="field">
          <input type="email" id="login-email" name="email" placeholder=" " required>
          <label for="login-email">Adresse e-mail</label>
        </div>
        <button type="submit" class="btn btn--accent" id="login-submit">Recevoir mon lien d'accès</button>
      </form>
    </div>

    <div id="login-success-view" class="login-success">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12l3 3 5-6"/></svg>
      <h2 style="font-family: var(--font-head); font-size: 1.4rem;">Lien envoyé !</h2>
      <p style="margin-bottom:0;">Vérifiez votre boîte de réception (et vos spams). Vous y trouverez un lien d'accès direct et sécurisé à votre tableau de bord.</p>
    </div>

  </div>
</main>
<script src="js/login.js" defer></script>
</body>
</html>
