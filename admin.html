<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:;">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Purity Agency</title>
<meta name="description" content="Espace d'administration Purity Agency.">
<meta property="og:image" content="https://purity-agency.be/assets/logo.png">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="css/site.css">
<link rel="stylesheet" href="css/site-extra.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body class="page-admin">
<div class="admin-login-wrap" id="admin-login">
  <div class="admin-login-card">
    <div class="admin-login-logo">PURITY<span class="admin-dot">.</span></div>
    <h1 class="admin-login-title">Administration</h1>
    <form id="admin-login-form" class="admin-form" novalidate>
      <div class="admin-field"><label for="admin-pwd">Mot de passe</label><input type="password" id="admin-pwd" required autocomplete="current-password" placeholder="••••••••"></div>
      <p class="admin-login-error" id="admin-login-error" aria-live="polite"></p>
      <button type="submit" class="admin-btn-primary" id="admin-login-btn">Accéder</button>
    </form>
  </div>
</div>
<div class="admin-dash" id="admin-dash" style="display:none;">
  <header class="admin-header">
    <div class="admin-header-logo">PURITY<span class="admin-dot">.</span> <span class="admin-header-tag">Admin</span></div>
    <button class="admin-logout-btn" id="admin-logout">Déconnexion</button>
  </header>
  <main class="admin-main">
    <div class="admin-toolbar">
      <h2 class="admin-page-title">Commandes</h2>
      <button class="admin-refresh-btn" id="admin-refresh"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Actualiser</button>
    </div>
    <div class="admin-loading" id="admin-orders-loading"><div class="admin-spinner" aria-hidden="true"></div><p>Chargement…</p></div>
    <p class="admin-empty" id="admin-orders-empty" style="display:none;">Aucune commande.</p>
    <div class="admin-orders-grid" id="admin-orders-grid" style="display:none;"></div>
  </main>
</div>
<script src="js/admin.js" defer></script>
</body>
</html>
